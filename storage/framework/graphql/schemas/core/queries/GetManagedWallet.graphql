query GetManagedWallet(
    $externalId: String
 ) {
  GetManagedWallet: GetWallet(externalId: $externalId) {
    account {
      publicKey
      address
    }
    tokenAccounts(first:50) {
      edges {
        node {
          balance
          token {
            collection {
              collectionId
            }
            tokenId
            tokenMetadata {
              name
            }
            attributes {
              key
              value
            }
          }
        }
      }
    }
  }
}
